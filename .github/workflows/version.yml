name: Download XanMod Kernel 6.18.2

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  download-kernels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse RSS and find 6.18.2 links
        id: parse
        run: |
          set -e

          RSS=$(curl -fsSL "https://sourceforge.net/p/xanmod/activity/feed")

          LINKS=$(echo "$RSS" | grep -oP 'https://sourceforge\.net/projects/xanmod/files/releases/main/6\.18\.2-xanmod1/[^"<>\s]+\.changes/download' | sort -u)

          if [ -z "$LINKS" ]; then
            echo "No links found"
            exit 1
          fi

          LINK_V3=$(echo "$LINKS" | grep 'x64v3' | tail -n1)
          LINK_V2=$(echo "$LINKS" | grep 'x64v2' | tail -n1)

          if [ -z "$LINK_V3" ] || [ -z "$LINK_V2" ]; then
            echo "Missing v2/v3"
            exit 1
          fi

          BASE_V3=$(echo "$LINK_V3" | grep -oP '.+(?=/linux-upstream_)')
          VER_V3=$(echo "$LINK_V3" | grep -oP '(?<=linux-upstream_)[^/]+(?=\.changes)')
          NAME_V3=$(echo "$BASE_V3" | grep -oP '[^/]+$')

          BASE_V2=$(echo "$LINK_V2" | grep -oP '.+(?=/linux-upstream_)')
          VER_V2=$(echo "$LINK_V2" | grep -oP '(?<=linux-upstream_)[^/]+(?=\.changes)')
          NAME_V2=$(echo "$BASE_V2" | grep -oP '[^/]+$')

          echo "base_v3=$BASE_V3" >> $GITHUB_OUTPUT
          echo "ver_v3=$VER_V3" >> $GITHUB_OUTPUT
          echo "name_v3=$NAME_V3" >> $GITHUB_OUTPUT

          echo "base_v2=$BASE_V2" >> $GITHUB_OUTPUT
          echo "ver_v2=$VER_V2" >> $GITHUB_OUTPUT
          echo "name_v2=$NAME_V2" >> $GITHUB_OUTPUT

      - name: Download x64v3
        run: |
          set -e
          mkdir -p kernel/6.18.2-x64v3-xanmod
          cd kernel/6.18.2-x64v3-xanmod

          BASE="${{ steps.parse.outputs.base_v3 }}"
          VER="${{ steps.parse.outputs.ver_v3 }}"
          NAME="${{ steps.parse.outputs.name_v3 }}"

          curl -fsSL "${BASE}/linux-image-${NAME}_${VER}.deb/download" -o linux-image.deb
          curl -fsSL "${BASE}/linux-headers-${NAME}_${VER}.deb/download" -o linux-headers.deb
          curl -fsSL "${BASE}/linux-libc-dev_${VER}.deb/download" -o linux-libc-dev.deb

          ls -lh

      - name: Download x64v2
        run: |
          set -e
          mkdir -p kernel/6.18.2-x64v2-xanmod
          cd kernel/6.18.2-x64v2-xanmod

          BASE="${{ steps.parse.outputs.base_v2 }}"
          VER="${{ steps.parse.outputs.ver_v2 }}"
          NAME="${{ steps.parse.outputs.name_v2 }}"

          curl -fsSL "${BASE}/linux-image-${NAME}_${VER}.deb/download" -o linux-image.deb
          curl -fsSL "${BASE}/linux-headers-${NAME}_${VER}.deb/download" -o linux-headers.deb
          curl -fsSL "${BASE}/linux-libc-dev_${VER}.deb/download" -o linux-libc-dev.deb

          ls -lh

      - name: Upload x64v3
        uses: actions/upload-artifact@v4
        with:
          name: xanmod-6.18.2-x64v3
          path: kernel/6.18.2-x64v3-xanmod/
          retention-days: 30

      - name: Upload x64v2
        uses: actions/upload-artifact@v4
        with:
          name: xanmod-6.18.2-x64v2
          path: kernel/6.18.2-x64v2-xanmod/
          retention-days: 30

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kernel/
          git diff --staged --quiet || git commit -m "update xanmod 6.18.2"
          git push
